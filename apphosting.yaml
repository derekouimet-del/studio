# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Minimum configuration for a responsive Pen-Quest instance
  maxInstances: 2
  environment:
    - variable: LLAMA_BASE_URL
      value: 'https://your-llama-instance.com'
  secrets:
    - secret: LLAMA_API_KEY
